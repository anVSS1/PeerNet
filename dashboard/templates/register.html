{% extends "auth_base.html" %}
{% block title %}Register - PeerNet++{% endblock %}

{% block content %}
<div class="card animate-fade-in">
    <div class="card-body">
        <div class="text-center mb-4">
            <h4><i class="fas fa-user-plus me-2"></i>Create Account</h4>
            <p class="text-muted">Join the academic community</p>
        </div>
        
        <div id="errorAlert" class="alert alert-danger" style="display: none;">
            <i class="fas fa-exclamation-triangle me-2"></i>
            <span id="errorMessage"></span>
        </div>
        
        <form id="registerForm">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" id="username" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <button type="submit" class="btn btn-success w-100" id="registerBtn">
                <i class="fas fa-user-plus me-2"></i>Create Account
            </button>
        </form>
        
        <hr>
        <div class="text-center">
            <p>Already have an account? <a href="/login" class="auth-link">Sign in here</a></p>
        </div>
    </div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const username = document.getElementById('username').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const registerBtn = document.getElementById('registerBtn');
    const errorAlert = document.getElementById('errorAlert');
    const errorMessage = document.getElementById('errorMessage');
    
    // Hide previous errors
    errorAlert.style.display = 'none';
    
    // Show loading state
    const originalText = registerBtn.innerHTML;
    registerBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Creating Account...';
    registerBtn.disabled = true;
    
    fetch('/api/auth/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username, email, password})
    })
    .then(response => response.json())
    .then(data => {
        if (data.user) {
            registerBtn.innerHTML = '<i class="fas fa-check me-2"></i>Success!';
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 500);
        } else {
            // Show error and reset form
            errorMessage.textContent = data.error || 'Registration failed';
            errorAlert.style.display = 'block';
            
            // Reset button
            registerBtn.innerHTML = originalText;
            registerBtn.disabled = false;
        }
    })
    .catch(error => {
        errorMessage.textContent = 'Connection error. Please try again.';
        errorAlert.style.display = 'block';
        
        // Reset button
        registerBtn.innerHTML = originalText;
        registerBtn.disabled = false;
    });
});
</script>
{% endblock %}
